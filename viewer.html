<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Simulation Viewer</title>
  <script src="https://cdn.jsdelivr.net/npm/protobufjs@7/dist/protobuf.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #f2f2f2;
      color: #151515;
      font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Masthead */
    .masthead {
      background: #151515;
      color: #fff;
      padding: 0 24px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 3px solid #EE0000;
      flex-shrink: 0;
    }
    .masthead-left {
      display: flex;
      align-items: center;
      gap: 0;
    }
    .masthead-brand {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .masthead-brand-text {
      color: #fff;
      font-weight: 600;
      font-size: 16px;
    }
    .masthead-sep {
      color: #4a4a4a;
      font-size: 20px;
      margin: 0 12px;
    }
    .masthead-app {
      color: #fff;
      font-weight: 700;
      font-size: 18px;
      letter-spacing: 0.5px;
    }
    #status {
      padding: 4px 14px;
      border-radius: 12px;
      font-size: 0.8em;
      font-weight: 500;
    }
    .connected { background: rgba(61,115,23,0.15); color: #3d7317; border: 1px solid #3d7317; }
    .disconnected { background: rgba(177,56,11,0.15); color: #c9190b; border: 1px solid #c9190b; }
    .connecting { background: rgba(185,132,18,0.15); color: #b98412; border: 1px solid #b98412; }

    /* Main layout */
    .main-layout {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* Sidebar */
    .sidebar {
      width: 280px;
      min-width: 280px;
      background: #fff;
      border-right: 1px solid #d2d2d2;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .sidebar-header {
      padding: 8px 12px;
      border-bottom: 1px solid #d2d2d2;
      background: #f5f5f5;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .sidebar-header .sidebar-label {
      font-size: 11px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #6a6e73;
      flex-shrink: 0;
    }
    .filter-select {
      font-size: 0.78em;
      padding: 3px 6px;
      border: 1px solid #d2d2d2;
      border-radius: 4px;
      background: #fff;
      color: #383838;
      cursor: pointer;
      max-width: 140px;
      font-family: system-ui, -apple-system, sans-serif;
    }
    .filter-select:focus { outline: 2px solid #6366f1; outline-offset: -1px; }
    .sidebar-content {
      flex: 1;
      overflow-y: auto;
      padding: 4px 0;
    }

    /* Tree view */
    .tree-group { margin: 0; }
    .tree-group-header {
      display: flex;
      align-items: center;
      padding: 5px 12px 5px 8px;
      cursor: pointer;
      user-select: none;
      font-size: 0.8em;
      font-weight: 600;
      color: #383838;
      transition: background 0.1s;
    }
    .tree-group-header:hover { background: #f5f5f5; }
    .tree-chevron {
      width: 16px;
      height: 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      color: #6a6e73;
      transition: transform 0.15s;
      flex-shrink: 0;
      margin-right: 2px;
    }
    .tree-chevron.collapsed { transform: rotate(-90deg); }
    .tree-group-items { margin: 0; }
    .tree-group-items.collapsed { display: none; }

    .tree-item {
      display: flex;
      align-items: center;
      padding: 4px 12px 4px 26px;
      cursor: pointer;
      font-size: 0.78em;
      color: #383838;
      transition: background 0.1s;
      gap: 6px;
      position: relative;
    }
    .tree-item:hover { background: #f0f0f0; }
    .tree-item.active { background: #e7f1e4; }

    .tree-icon {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
    }
    .tree-icon.camera { color: #3d7317; }
    .tree-icon.clock { color: #b98412; }
    .tree-icon.pose { color: #6366f1; }
    .tree-icon.scene { color: #818cf8; }
    .tree-icon.command { color: #c9190b; }
    .tree-icon.info { color: #0066cc; }
    .tree-icon.data { color: #6a6e73; }
    .tree-icon.stats { color: #b98412; }

    .tree-label {
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-family: 'SF Mono', 'Fira Code', ui-monospace, monospace;
      font-size: 0.95em;
    }

    .tree-action {
      opacity: 0;
      padding: 2px 8px;
      font-size: 0.85em;
      border-radius: 3px;
      border: 1px solid;
      background: transparent;
      cursor: pointer;
      flex-shrink: 0;
      transition: opacity 0.1s;
    }
    .tree-item:hover .tree-action { opacity: 1; }
    .tree-action.stream { border-color: #3d7317; color: #3d7317; }
    .tree-action.stream:hover { background: #3d7317; color: #fff; }
    .tree-action.stream.active { background: #3d7317; color: #fff; opacity: 1; }
    .tree-action.stop { border-color: #c9190b; color: #c9190b; }
    .tree-action.stop:hover { background: #c9190b; color: #fff; }
    .tree-action.sub { border-color: #6366f1; color: #6366f1; }
    .tree-action.sub:hover { background: #6366f1; color: #fff; }
    .tree-action.sub.active { background: #6366f1; color: #fff; opacity: 1; }

    .tree-hz {
      font-size: 0.8em;
      color: #6a6e73;
      font-family: 'SF Mono', 'Fira Code', ui-monospace, monospace;
      min-width: 28px;
      text-align: right;
      flex-shrink: 0;
    }

    /* Content area */
    .content {
      flex: 1;
      padding: 20px 24px;
      overflow-y: auto;
    }

    /* Video player */
    .card {
      background: #fff;
      border: 1px solid #d2d2d2;
      border-radius: 8px;
      overflow: hidden;
      margin-bottom: 16px;
      box-shadow: 0 1px 2px rgba(0,0,0,0.06);
    }
    #video-container { margin-bottom: 20px; }
    #webrtc-player {
      width: 100%;
      border-radius: 8px 8px 0 0;
      background: #151515;
      display: block;
    }
    #video-footer { background: #fff; }
    #video-status {
      padding: 10px 16px;
      font-size: 0.85em;
      color: #6a6e73;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    #video-status .stream-name {
      font-family: 'SF Mono', 'Fira Code', ui-monospace, monospace;
      color: #3d7317;
      font-weight: 500;
    }

    button {
      padding: 6px 16px;
      border: 1px solid #d2d2d2;
      background: #fff;
      color: #151515;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.85em;
      font-weight: 500;
      transition: all 0.15s;
    }
    button:hover { background: #f0f0f0; }
    .btn-danger { border-color: #c9190b; color: #c9190b; }
    .btn-danger:hover { background: #c9190b; color: #fff; }

    /* Section label */
    .section-label {
      font-size: 11px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #6a6e73;
      margin-bottom: 8px;
    }

    /* Live data cards */
    .data-card {
      background: #fff;
      border: 1px solid #d2d2d2;
      border-radius: 8px;
      margin-bottom: 12px;
      overflow: hidden;
      box-shadow: 0 1px 2px rgba(0,0,0,0.06);
    }
    .data-card-header {
      background: #f5f5f5;
      padding: 8px 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      user-select: none;
      border-bottom: 1px solid #eee;
      gap: 8px;
    }
    .card-header-left {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
      flex: 1;
    }
    .card-header-right {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }
    .topic-name {
      font-family: 'SF Mono', 'Fira Code', ui-monospace, monospace;
      font-size: 0.82em;
      color: #151515;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .msg-type-badge {
      font-size: 0.68em;
      padding: 2px 7px;
      border-radius: 10px;
      background: #ebebeb;
      color: #6a6e73;
      font-family: 'SF Mono', ui-monospace, monospace;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .hz-badge {
      font-size: 0.72em;
      padding: 2px 8px;
      border-radius: 10px;
      background: #e7f1e4;
      color: #3d7317;
      font-family: 'SF Mono', ui-monospace, monospace;
      font-weight: 600;
      min-width: 52px;
      text-align: center;
      white-space: nowrap;
    }
    .hz-badge:empty { display: none; }
    .data-card-body { background: #fafafa; }
    .data-card-body.collapsed { display: none; }
    .card-waiting {
      padding: 14px 16px;
      color: #6a6e73;
      font-size: 0.83em;
      font-style: italic;
    }
    /* Section dividers within a card */
    .card-section-label {
      font-size: 0.67em;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.9px;
      color: #8a8a8a;
      padding: 8px 14px 3px;
      border-top: 1px solid #efefef;
    }
    .card-section-label:first-child { border-top: none; padding-top: 10px; }
    /* Metric grid */
    .metric-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(70px, 1fr));
      gap: 6px;
      padding: 5px 12px 10px;
    }
    .metric-cell {
      background: #fff;
      border: 1px solid #e8e8e8;
      border-radius: 6px;
      padding: 6px 8px 5px;
    }
    .metric-label {
      font-size: 0.63em;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #8a8a8a;
      margin-bottom: 3px;
      white-space: nowrap;
    }
    .metric-value {
      font-family: 'SF Mono', 'Fira Code', ui-monospace, monospace;
      font-size: 0.88em;
      color: #151515;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .metric-unit {
      font-size: 0.72em;
      color: #aaa;
      margin-left: 2px;
      font-weight: 400;
    }
    /* Clock */
    .clock-row {
      display: flex;
      align-items: baseline;
      gap: 10px;
      padding: 10px 14px;
      border-top: 1px solid #efefef;
    }
    .clock-row:first-child { border-top: none; }
    .clock-label {
      font-size: 0.63em;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: #8a8a8a;
      width: 34px;
      flex-shrink: 0;
    }
    .clock-value {
      font-family: 'SF Mono', 'Fira Code', ui-monospace, monospace;
      font-size: 1.05em;
      color: #151515;
      font-weight: 500;
      letter-spacing: 1px;
    }
    /* Entity name label inside a card */
    .card-entity-name {
      font-family: 'SF Mono', monospace;
      font-size: 0.78em;
      color: #6366f1;
      padding: 7px 14px 2px;
      font-weight: 500;
    }
    /* Pose_V table */
    .pose-table-wrap {
      max-height: 220px;
      overflow-y: auto;
      padding: 6px 12px 10px;
    }
    .pose-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.77em;
    }
    .pose-table th {
      font-size: 0.72em;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      color: #8a8a8a;
      text-align: left;
      padding: 4px 8px;
      border-bottom: 1px solid #e8e8e8;
      white-space: nowrap;
      position: sticky;
      top: 0;
      background: #fafafa;
    }
    .pose-table th:not(:first-child) { text-align: right; }
    .pose-table td { padding: 3px 8px; border-bottom: 1px solid #f5f5f5; }
    .pose-table tbody tr:hover { background: #f0f0f0; }
    .pose-table-name {
      font-family: 'SF Mono', monospace;
      color: #383838;
      max-width: 140px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .pose-table-val {
      font-family: 'SF Mono', monospace;
      color: #151515;
      text-align: right;
    }
    /* Generic key-value fallback */
    .kv-wrap {
      max-height: 260px;
      overflow-y: auto;
      padding: 8px 14px 10px;
    }
    .kv-table { width: 100%; border-collapse: collapse; font-size: 0.77em; }
    .kv-key {
      font-family: 'SF Mono', monospace;
      color: #6a6e73;
      padding: 3px 10px 3px 0;
      border-bottom: 1px solid #f5f5f5;
      width: 45%;
      vertical-align: top;
    }
    .kv-val {
      font-family: 'SF Mono', monospace;
      color: #151515;
      padding: 3px 0 3px 8px;
      border-bottom: 1px solid #f5f5f5;
      word-break: break-all;
    }
    .unsub-btn {
      padding: 2px 9px;
      font-size: 0.72em;
      border: 1px solid #c9190b;
      color: #c9190b;
      background: transparent;
      border-radius: 4px;
      cursor: pointer;
      font-family: system-ui, sans-serif;
    }
    .unsub-btn:hover { background: #c9190b; color: #fff; }

    /* Hz color thresholds */
    .hz-badge.hz-warn { background: rgba(185,132,18,0.15); color: #b98412; }
    .hz-badge.hz-bad  { background: rgba(201,25,11,0.15);  color: #c9190b; }

    /* Freeze button */
    .freeze-btn {
      padding: 2px 9px;
      font-size: 0.72em;
      border: 1px solid #6a6e73;
      color: #6a6e73;
      background: transparent;
      border-radius: 4px;
      cursor: pointer;
      font-family: system-ui, sans-serif;
      transition: all 0.15s;
    }
    .freeze-btn:hover { background: rgba(99,102,241,0.1); border-color: #6366f1; color: #6366f1; }
    .freeze-btn.active { background: #6366f1; color: #fff; border-color: #6366f1; }
    .data-card.frozen { border-color: #6366f1; }
    .data-card.frozen .data-card-header { background: #f0f0ff; }
    .data-card.frozen .data-card-body { opacity: 0.75; }

    /* Odometry layout: attitude indicator beside position/orientation grids */
    .odometry-top {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 10px 12px 4px;
    }
    .odometry-top-right { flex: 1; min-width: 0; }
    .odometry-top-right .card-section-label { border-top: none; padding-top: 0; }
    .odometry-top-right .metric-grid { padding: 3px 4px 6px; }

    /* Attitude indicator SVG */
    .attitude-indicator { width: 92px; height: 92px; flex-shrink: 0; border-radius: 50%; overflow: visible; }

    /* Altitude sparkline */
    .sparkline-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 14px 8px;
      border-top: 1px solid #efefef;
    }
    .sparkline-label {
      font-size: 0.63em;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: #8a8a8a;
      width: 26px;
      flex-shrink: 0;
    }
    .sparkline { flex: 1; height: 34px; overflow: visible; }
    .sparkline-range {
      font-family: 'SF Mono', monospace;
      font-size: 0.68em;
      color: #6a6e73;
      white-space: nowrap;
      flex-shrink: 0;
    }

    /* Pose_V drill-down */
    .pose-table tr { cursor: pointer; }
    .pose-table tr.row-pinned { background: #eef0ff; }
    .pose-table tr.row-pinned:hover { background: #e0e4ff; }
    .pinned-entity-card { border-color: #6366f1; }
    .pinned-entity-card .data-card-header { background: #f0f0ff; }

    /* Stream rows inside video footer */
    .streams-list { border-top: 1px solid #eee; }
    .stream-row {
      display: flex;
      align-items: center;
      padding: 7px 16px;
      gap: 10px;
      font-size: 0.83em;
      border-top: 1px solid #f5f5f5;
    }
    .stream-row:first-child { border-top: none; }
    .stream-row.watching { background: rgba(61,115,23,0.04); }
    .stream-row-name {
      font-family: 'SF Mono', 'Fira Code', ui-monospace, monospace;
      font-weight: 500;
      color: #151515;
    }
    .stream-status-badge {
      font-size: 0.72em;
      padding: 1px 7px;
      border-radius: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      white-space: nowrap;
    }
    .stream-status-badge.online { background: rgba(61,115,23,0.15); color: #3d7317; }
    .stream-status-badge.ready  { background: rgba(185,132,18,0.15); color: #b98412; }
    .stream-status-badge.offline { background: rgba(106,110,115,0.12); color: #6a6e73; }
    .stream-codec {
      font-size: 0.72em;
      padding: 1px 7px;
      border-radius: 10px;
      background: #ebebeb;
      color: #6a6e73;
      font-family: 'SF Mono', ui-monospace, monospace;
      white-space: nowrap;
    }
    .stream-metrics {
      display: flex;
      gap: 12px;
      margin-left: auto;
      align-items: center;
    }
    .stream-metric {
      font-family: 'SF Mono', ui-monospace, monospace;
      font-size: 0.82em;
      color: #6a6e73;
      white-space: nowrap;
    }
    .stream-metric-label {
      font-size: 0.85em;
      text-transform: uppercase;
      letter-spacing: 0.3px;
      color: #aaa;
      margin-right: 3px;
    }
    .stream-watch-btn {
      padding: 2px 10px;
      font-size: 0.78em;
      border: 1px solid #3d7317;
      color: #3d7317;
      background: transparent;
      border-radius: 4px;
      cursor: pointer;
      font-family: system-ui, sans-serif;
    }
    .stream-watch-btn:hover { background: #3d7317; color: #fff; }
  </style>
</head>
<body>
  <div class="masthead">
    <div class="masthead-left">
      <div class="masthead-brand">
        <svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg" style="width:36px;height:36px">
          <g transform="translate(-20 -16)">
            <g transform="translate(19.5 21.5)">
              <path d="M40.8 14.8c.1.3.1.6.1.9 0 3.7-4.5 4.4-7.7 4.4C21 20.1 12 12.5 12 10.2c0-.2 0-.3.1-.5l-1 2.3c-.2.6-.4 1.2-.4 1.8 0 4.5 10.2 11.4 21.9 11.4 5.2 0 9.1-1.9 9.1-5.4-.1-.9-.2-1.7-.4-2.5l-.5-2.5z" fill="#fff"/>
              <path d="M33.2 20c3.1 0 7.7-.6 7.7-4.4 0-.3 0-.6-.1-.9l-1.9-8.1c-.4-1.8-.8-2.6-3.9-4.2-2.4-1.2-7.7-3.3-9.3-3.3-1.5 0-1.9 1.9-3.6 1.9S19.2-.4 17.6-.4c-1.5 0-2.5 1-3.2 3.1 0 0-2.1 5.9-2.4 6.8 0 .2-.1.3-.1.5 0 2.5 9.1 10 21.3 10m8.1-2.8c.2.8.4 1.7.4 2.5 0 3.5-3.9 5.4-9.1 5.4-11.7 0-21.9-6.8-21.9-11.4 0-.6.1-1.3.4-1.8-4.2.2-9.6 1-9.6 5.8 0 7.9 18.6 17.6 33.4 17.6 11.3 0 14.2-5.1 14.2-9.2-.1-3.1-2.8-6.8-7.8-8.9" fill="#e00"/>
            </g>
          </g>
        </svg>
        <span class="masthead-brand-text">Red Hat</span>
      </div>
      <span class="masthead-sep">|</span>
      <span class="masthead-app">Simulation Viewer</span>
    </div>
    <div id="status" class="connecting">Connecting...</div>
  </div>

  <div class="main-layout">
    <div class="sidebar">
      <div class="sidebar-header">
        <span class="sidebar-label">Topics</span>
        <select class="filter-select" id="topic-filter" onchange="renderTopicTree()">
          <option value="all">All topics</option>
          <option value="cameras">Cameras</option>
          <option value="sensors">Sensors</option>
          <option value="commands">Commands</option>
          <option value="world">World</option>
          <option value="model">Model</option>
        </select>
      </div>
      <div class="sidebar-content" id="topic-tree"></div>
    </div>

    <div class="content">
      <div class="card" id="video-container">
        <video id="webrtc-player" autoplay playsinline muted></video>
        <div id="video-footer">
          <div id="video-status">
            <span id="video-info">Waiting for camera...</span>
            <span><button id="stop-btn" class="btn-danger" style="display:none" onclick="stopStream()">Stop Stream</button></span>
          </div>
          <div id="streams-panel" class="streams-list"></div>
        </div>
      </div>
      <div id="live-data"></div>
    </div>
  </div>

  <script>
    const WS_URL = 'ws://localhost:9002';
    const STREAM_CONTROL_TOPIC = '/stream/control';
    const MEDIAMTX_BASE = 'http://localhost:8889';
    const MEDIAMTX_API = 'http://localhost:9997';

    let ws = null;
    let protoRoot = null;
    let topicTypes = {};
    let subscriptions = {};
    let activeStream = null;
    let webrtcPc = null;
    let autoStreamDone = false;
    let collapsedGroups = {};
    let streamsPollTimer = null;

    const PINNED_GROUPS = {
      '/quadcopter_demo': 'quadcopter_demo',
      '/X3': 'x3_uav',
    };

    const statusEl = document.getElementById('status');
    const videoInfoEl = document.getElementById('video-info');
    const stopBtn = document.getElementById('stop-btn');

    function setStatus(text, cls) {
      statusEl.textContent = text;
      statusEl.className = cls;
    }

    // -- Icon mapping by message type --

    function getTopicIcon(topic, msgType) {
      if (msgType === 'gz.msgs.Image') return ['camera', '\u{1F3A5}'];
      if (msgType === 'gz.msgs.CameraInfo') return ['info', '\u{2139}'];
      if (msgType === 'gz.msgs.Clock') return ['clock', '\u{23F1}'];
      if (/Pose/.test(msgType)) return ['pose', '\u{2316}'];
      if (/Scene/.test(msgType)) return ['scene', '\u{1F3D7}'];
      if (/WorldStatistics/.test(msgType)) return ['stats', '\u{1F4CA}'];
      if (/Twist|Actuators|motor/.test(msgType) || /command/.test(topic))
        return ['command', '\u{2699}'];
      if (/Marker/.test(msgType)) return ['data', '\u{25C8}'];
      if (/UInt|String|Boolean|Serialized/.test(msgType)) return ['data', '\u{2630}'];
      return ['data', '\u{25CB}'];
    }

    function getShortType(msgType) {
      return msgType.replace(/^gz\.msgs\./, '');
    }

    // -- Build recursive tree structure from topic paths --

    function buildTopicTree(topicMap) {
      const root = { items: [], children: {} };

      // Pre-seed pinned groups so they always appear
      for (const key of Object.keys(PINNED_GROUPS)) {
        const seg = key.replace(/^\//, '');
        if (!root.children[seg]) root.children[seg] = { items: [], children: {} };
      }

      for (const [topic, type] of Object.entries(topicMap)) {
        const parts = topic.replace(/^\//, '').split('/').filter(Boolean);
        if (parts.length === 0) continue;
        insertIntoTree(root, parts, topic, type);
      }

      return root;
    }

    function insertIntoTree(node, parts, topic, type) {
      if (parts.length === 1) {
        node.items.push({ topic, type, label: parts[0] });
      } else {
        const seg = parts[0];
        if (!node.children[seg]) node.children[seg] = { items: [], children: {} };
        insertIntoTree(node.children[seg], parts.slice(1), topic, type);
      }
    }

    // -- Render tree sidebar --

    function filterTopics(topicMap) {
      const filter = document.getElementById('topic-filter').value;
      if (filter === 'all') return topicMap;

      const filtered = {};
      for (const [topic, type] of Object.entries(topicMap)) {
        let match = false;
        switch (filter) {
          case 'cameras':
            match = type === 'gz.msgs.Image' || type === 'gz.msgs.CameraInfo';
            break;
          case 'sensors':
            match = type === 'gz.msgs.Image' || type === 'gz.msgs.CameraInfo' ||
                    /Marker|IMU|LaserScan|PointCloud|ContactSensor/.test(type) ||
                    /sensor/i.test(topic);
            break;
          case 'commands':
            match = /command/i.test(topic) || /Twist|Actuators|Boolean/.test(type) ||
                    /control/i.test(topic) || /enable/i.test(topic);
            break;
          case 'world':
            match = /^\/world\//i.test(topic) || type === 'gz.msgs.Clock' ||
                    /Scene|WorldStatistics|Pose_V/.test(type);
            break;
          case 'model':
            match = /^\/model\//i.test(topic) || /Odometry|Pose/.test(type);
            break;
        }
        if (match) filtered[topic] = type;
      }
      return filtered;
    }

    function renderTopicTree() {
      const container = document.getElementById('topic-tree');
      container.innerHTML = '';
      const filteredTopics = filterTopics(topicTypes);
      const tree = buildTopicTree(filteredTopics);
      renderTreeNode(container, tree, '', 0);
    }

    function renderTreeNode(container, node, path, depth) {
      const childKeys = Object.keys(node.children).sort();
      for (const seg of childKeys) {
        const child = node.children[seg];
        const childPath = path + '/' + seg;
        const isCollapsed = collapsedGroups[childPath] || false;
        const displayLabel = (depth === 0 && PINNED_GROUPS['/' + seg])
          ? PINNED_GROUPS['/' + seg]
          : seg;

        const groupEl = document.createElement('div');
        groupEl.className = 'tree-group';

        const headerEl = document.createElement('div');
        headerEl.className = 'tree-group-header';
        headerEl.style.paddingLeft = (8 + depth * 14) + 'px';
        headerEl.onclick = () => toggleGroup(childPath);
        headerEl.innerHTML = `
          <span class="tree-chevron ${isCollapsed ? 'collapsed' : ''}">▼</span>
          ${escHtml(displayLabel)}`;

        const itemsEl = document.createElement('div');
        itemsEl.className = 'tree-group-items' + (isCollapsed ? ' collapsed' : '');
        itemsEl.id = 'group-' + cssId(childPath);

        renderTreeNode(itemsEl, child, childPath, depth + 1);

        groupEl.appendChild(headerEl);
        groupEl.appendChild(itemsEl);
        container.appendChild(groupEl);
      }

      for (const item of node.items) {
        const [iconClass, iconChar] = getTopicIcon(item.topic, item.type);
        const isImage = item.type === 'gz.msgs.Image';
        const isSubscribed = !!subscriptions[item.topic];
        const isStreaming = activeStream === item.topic;

        const itemEl = document.createElement('div');
        itemEl.className = 'tree-item' + (isStreaming ? ' active' : '');
        itemEl.title = item.topic + ' (' + item.type + ')';
        itemEl.style.paddingLeft = (26 + depth * 14) + 'px';
        itemEl.innerHTML = `
          <span class="tree-icon ${iconClass}">${iconChar}</span>
          <span class="tree-label">${escHtml(item.label)}</span>
          <span class="tree-hz" id="rate-${cssId(item.topic)}"></span>
          ${isImage
            ? (isStreaming
              ? `<button class="tree-action stop" onclick="event.stopPropagation();stopStream()">Stop</button>`
              : `<button class="tree-action stream" onclick="event.stopPropagation();startStream('${escAttr(item.topic)}')">Stream</button>`)
            : `<button class="tree-action sub ${isSubscribed ? 'active' : ''}"
                 onclick="event.stopPropagation();toggleSub('${escAttr(item.topic)}','${escAttr(item.type)}')">${isSubscribed ? 'Unsub' : 'Sub'}</button>`
          }`;

        if (!isImage) {
          itemEl.addEventListener('click', () => toggleSub(item.topic, item.type));
        } else {
          itemEl.addEventListener('click', () => {
            if (isStreaming) return;
            startStream(item.topic);
          });
        }

        container.appendChild(itemEl);
      }
    }

    function toggleGroup(group) {
      collapsedGroups[group] = !collapsedGroups[group];
      renderTopicTree();
    }

    // -- Connection flow: auth -> protos -> topics-types --

    let connectPhase = 'idle';

    function doConnect() {
      if (ws && ws.readyState === WebSocket.OPEN) return;

      setStatus('Connecting...', 'connecting');
      connectPhase = 'auth';
      protoRoot = null;
      autoStreamDone = false;

      ws = new WebSocket(WS_URL);
      ws.binaryType = 'arraybuffer';

      ws.onopen = () => { ws.send('auth,,,'); };

      ws.onclose = () => {
        setStatus('Disconnected', 'disconnected');
        connectPhase = 'idle';
        ws = null;
        stopStreamsPoll();
      };

      ws.onerror = () => {
        setStatus('Connection error', 'disconnected');
      };

      ws.onmessage = (event) => {
        const raw = (event.data instanceof ArrayBuffer)
          ? new Uint8Array(event.data)
          : new TextEncoder().encode(event.data);

        if (connectPhase === 'auth') {
          const text = new TextDecoder().decode(raw);
          if (text === 'authorized') {
            connectPhase = 'protos';
            ws.send('protos,,,');
          } else {
            setStatus('Auth failed', 'disconnected');
          }
          return;
        }

        if (connectPhase === 'protos') {
          const text = new TextDecoder().decode(raw);
          try {
            protoRoot = protobuf.parse(text, { keepCase: true }).root;
            connectPhase = 'ready';
            setStatus('Connected', 'connected');
            ws.send('topics-types,,,');
            startStreamsPoll();
          } catch (e) {
            setStatus('Proto parse failed', 'disconnected');
          }
          return;
        }

        handleMessage(raw);
      };
    }

    // -- Parse frame header --

    function parseFrameHeader(bytes) {
      let commaPositions = [];
      for (let i = 0; i < Math.min(bytes.length, 500); i++) {
        if (bytes[i] === 0x2C) {
          commaPositions.push(i);
          if (commaPositions.length === 3) break;
        }
      }
      if (commaPositions.length < 3) return null;

      const headerEnd = commaPositions[2] + 1;
      const headerStr = new TextDecoder().decode(bytes.slice(0, commaPositions[2]));
      const parts = headerStr.split(',');

      return {
        op: parts[0],
        topic: parts[1],
        type: parts[2],
        payloadOffset: headerEnd
      };
    }

    // -- Message router --

    function handleMessage(raw) {
      for (let i = 0; i < Math.min(raw.length, 200); i++) {
        if (raw[i] === 0x89 && raw[i+1] === 0x50 &&
            raw[i+2] === 0x4E && raw[i+3] === 0x47) {
          return;
        }
      }

      const frame = parseFrameHeader(raw);
      if (!frame) return;

      const payload = raw.slice(frame.payloadOffset);

      if (frame.topic === 'topics-types') {
        handleTopicTypes(payload, frame.type);
      } else if (subscriptions[frame.topic]) {
        handleSubscriptionData(frame.topic, frame.type, payload);
      }
    }

    // -- Topics list handler --

    function handleTopicTypes(payload, type) {
      if (!protoRoot) return;

      try {
        const MsgType = protoRoot.lookup(type);
        const msg = MsgType.decode(payload);

        topicTypes = {};
        if (msg.publisher) {
          msg.publisher.forEach(p => {
            topicTypes[p.topic] = p.msg_type || p.msgType || '';
          });
        }
        renderTopicTree();

        if (!autoStreamDone) {
          autoStreamDone = true;
          const cameras = Object.keys(topicTypes).filter(
            t => topicTypes[t] === 'gz.msgs.Image'
          );
          const preferred = cameras.find(t => /tower|overview|scene/i.test(t));
          const target = preferred || cameras[0];
          if (target) {
            startStream(target);
          }
        }
      } catch (e) {
        console.error('Failed to decode topics-types:', e);
      }
    }

    // -- Subscribe / Unsubscribe --

    function toggleSub(topic, type) {
      if (subscriptions[topic]) {
        unsubscribe(topic);
      } else {
        subscribe(topic, type);
      }
    }

    function subscribe(topic, type) {
      if (!ws || ws.readyState !== WebSocket.OPEN) return;
      ws.send('sub,' + topic + ',,');

      const id = cssId(topic);
      const shortType = getShortType(type);
      const liveData = document.getElementById('live-data');
      const card = document.createElement('div');
      card.className = 'data-card';
      card.id = 'card-' + id;
      card.innerHTML = `
        <div class="data-card-header" onclick="toggleCardBody('${id}')">
          <div class="card-header-left">
            <span class="topic-name">${escHtml(topic)}</span>
            <span class="msg-type-badge">${escHtml(shortType)}</span>
          </div>
          <div class="card-header-right">
            <span class="hz-badge" id="card-hz-${id}"></span>
            <button class="freeze-btn" id="freeze-${id}" onclick="event.stopPropagation(); toggleFreeze('${escAttr(topic)}')">Freeze</button>
            <button class="unsub-btn" onclick="event.stopPropagation(); unsubscribe('${escAttr(topic)}')">Unsub</button>
          </div>
        </div>
        <div class="data-card-body" id="card-body-${id}">
          <div class="card-waiting">Waiting for data...</div>
        </div>`;
      liveData.appendChild(card);

      subscriptions[topic] = {
        type, count: 0, lastDomUpdate: 0,
        lastCountReset: performance.now(), hz: 0, cardEl: card,
        frozen: false, altHistory: [], pinnedEntities: null
      };

      renderTopicTree();
    }

    function unsubscribe(topic) {
      if (ws && ws.readyState === WebSocket.OPEN) ws.send('unsub,' + topic + ',,');
      const sub = subscriptions[topic];
      if (sub && sub.cardEl) sub.cardEl.remove();
      delete subscriptions[topic];

      const rateEl = document.getElementById('rate-' + cssId(topic));
      if (rateEl) rateEl.textContent = '';

      renderTopicTree();
    }

    function toggleCardBody(id) {
      const body = document.getElementById('card-body-' + id);
      if (body) body.classList.toggle('collapsed');
    }

    // -- Subscription data handler --

    function handleSubscriptionData(topic, type, payload) {
      const sub = subscriptions[topic];
      if (!sub || !protoRoot) return;

      sub.count++;
      const now = performance.now();

      if (now - sub.lastCountReset >= 1000) {
        sub.hz = sub.count;
        sub.count = 0;
        sub.lastCountReset = now;
        updateHzBadge(cssId(topic), sub.hz);
        const rateEl = document.getElementById('rate-' + cssId(topic));
        if (rateEl) rateEl.textContent = sub.hz;
      }

      if (sub.frozen) return;

      if (now - sub.lastDomUpdate < 200) return;
      sub.lastDomUpdate = now;

      try {
        const MsgType = protoRoot.lookup(type);
        const msg = MsgType.decode(payload);
        const obj = MsgType.toObject(msg, { longs: Number, enums: String, defaults: true });

        const bodyEl = document.getElementById('card-body-' + cssId(topic));
        if (bodyEl) renderData(bodyEl, type, obj, topic);
      } catch (e) {
        const bodyEl = document.getElementById('card-body-' + cssId(topic));
        if (bodyEl) bodyEl.innerHTML =
          `<div style="padding:12px 14px;color:#c9190b;font-size:0.83em">Decode error: ${escHtml(e.message)}</div>`;
      }
    }

    // -- Hz badge + freeze + pin helpers --

    function updateHzBadge(id, hz) {
      const el = document.getElementById('card-hz-' + id);
      if (!el) return;
      el.textContent = hz + ' Hz';
      el.className = 'hz-badge' + (hz >= 10 ? '' : hz >= 2 ? ' hz-warn' : ' hz-bad');
    }

    function toggleFreeze(topic) {
      const sub = subscriptions[topic];
      if (!sub) return;
      sub.frozen = !sub.frozen;
      const id = cssId(topic);
      const btn = document.getElementById('freeze-' + id);
      if (btn) {
        btn.textContent = sub.frozen ? 'Unfreeze' : 'Freeze';
        btn.classList.toggle('active', sub.frozen);
      }
      const card = document.getElementById('card-' + id);
      if (card) card.classList.toggle('frozen', sub.frozen);
    }

    function pinEntityPose(poseVTopic, entityName) {
      const sub = subscriptions[poseVTopic];
      if (!sub) return;
      if (!sub.pinnedEntities) sub.pinnedEntities = new Set();

      const pinnedId = 'card-pinned-' + cssId(entityName);

      if (sub.pinnedEntities.has(entityName)) {
        sub.pinnedEntities.delete(entityName);
        const existing = document.getElementById(pinnedId);
        if (existing) existing.remove();
        return;
      }

      sub.pinnedEntities.add(entityName);

      const liveData = document.getElementById('live-data');
      const card = document.createElement('div');
      card.className = 'data-card pinned-entity-card';
      card.id = pinnedId;
      card.innerHTML = `
        <div class="data-card-header">
          <div class="card-header-left">
            <span class="topic-name">[pinned] ${escHtml(entityName)}</span>
            <span class="msg-type-badge">Pose</span>
          </div>
          <div class="card-header-right">
            <button class="unsub-btn" onclick="pinEntityPose('${escAttr(poseVTopic)}', '${escAttr(entityName)}')">Unpin</button>
          </div>
        </div>
        <div class="data-card-body" id="card-pinned-body-${cssId(entityName)}">
          <div class="card-waiting">Waiting for data...</div>
        </div>`;
      liveData.appendChild(card);
    }

    // -- Data renderers --

    function quatToEuler(x, y, z, w) {
      const roll  = Math.atan2(2*(w*x + y*z), 1 - 2*(x*x + y*y));
      const sinp  = 2*(w*y - z*x);
      const pitch = Math.abs(sinp) >= 1 ? Math.sign(sinp)*Math.PI/2 : Math.asin(sinp);
      const yaw   = Math.atan2(2*(w*z + x*y), 1 - 2*(y*y + z*z));
      return [roll, pitch, yaw].map(r => r * 180 / Math.PI);
    }

    function fmtN(v, d=3) {
      if (v === undefined || v === null) return '—';
      return Number(v).toFixed(d);
    }

    function fmtTime(sec, nsec) {
      const t = (sec || 0) + (nsec || 0) / 1e9;
      const h = Math.floor(t / 3600);
      const m = Math.floor((t % 3600) / 60);
      const s = t % 60;
      return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${s.toFixed(3).padStart(6,'0')}`;
    }

    function cell(label, value, unit='') {
      return `<div class="metric-cell">
        <div class="metric-label">${label}</div>
        <div class="metric-value">${value}${unit ? `<span class="metric-unit">${unit}</span>` : ''}</div>
      </div>`;
    }

    function section(label) {
      return `<div class="card-section-label">${label}</div>`;
    }

    function grid(cells) {
      return `<div class="metric-grid">${cells.join('')}</div>`;
    }

    function attitudeIndicator(roll, pitch, uid) {
      const clipId = 'ai-clip-' + uid;
      const pitchPx = Math.max(-40, Math.min(40, pitch * 0.7));
      return `<svg class="attitude-indicator" viewBox="-50 -50 100 100">
        <defs>
          <clipPath id="${clipId}">
            <circle cx="0" cy="0" r="44"/>
          </clipPath>
        </defs>
        <g clip-path="url(#${clipId})">
          <g transform="rotate(${-roll}) translate(0, ${pitchPx.toFixed(2)})">
            <rect x="-100" y="-100" width="200" height="100" fill="#1a6eb5"/>
            <rect x="-100" y="0" width="200" height="100" fill="#7a4a1a"/>
            <line x1="-100" y1="0" x2="100" y2="0" stroke="white" stroke-width="1.5"/>
            <line x1="-14" y1="-14" x2="14" y2="-14" stroke="white" stroke-width="0.8" opacity="0.7"/>
            <line x1="-9" y1="-28" x2="9" y2="-28" stroke="white" stroke-width="0.8" opacity="0.7"/>
            <line x1="-14" y1="14" x2="14" y2="14" stroke="white" stroke-width="0.8" opacity="0.7"/>
            <line x1="-9" y1="28" x2="9" y2="28" stroke="white" stroke-width="0.8" opacity="0.7"/>
          </g>
        </g>
        <line x1="-24" y1="0" x2="-8" y2="0" stroke="#f0c000" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="8" y1="0" x2="24" y2="0" stroke="#f0c000" stroke-width="2.5" stroke-linecap="round"/>
        <circle cx="0" cy="0" r="2.5" fill="#f0c000"/>
        <circle cx="0" cy="0" r="44" stroke="#555" stroke-width="1.5" fill="none"/>
        <g transform="rotate(${-roll})">
          <polygon points="0,-44 -4,-38 4,-38" fill="white" opacity="0.9"/>
        </g>
      </svg>`;
    }

    function altSparkline(data) {
      const W = 240, H = 34;
      const min = Math.min(...data);
      const max = Math.max(...data);
      const range = max - min || 0.1;
      const pts = data.map((v, i) => {
        const x = (i / (data.length - 1)) * W;
        const y = H - ((v - min) / range) * H;
        return x.toFixed(1) + ',' + y.toFixed(1);
      }).join(' ');
      return `<div class="sparkline-wrap">
        <span class="sparkline-label">ALT</span>
        <svg class="sparkline" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
          <polyline points="${pts}" fill="none" stroke="#6366f1" stroke-width="1.5" stroke-linejoin="round"/>
        </svg>
        <span class="sparkline-range">${fmtN(min, 1)}-${fmtN(max, 1)} m</span>
      </div>`;
    }

    function renderData(bodyEl, type, obj, topic) {
      switch (type) {
        case 'gz.msgs.Pose':                    return renderPose(bodyEl, obj);
        case 'gz.msgs.Pose_V':                  return renderPoseV(bodyEl, obj, topic);
        case 'gz.msgs.Odometry':
        case 'gz.msgs.OdometryWithCovariance':  return renderOdometry(bodyEl, obj, topic);
        case 'gz.msgs.Clock':                   return renderClock(bodyEl, obj);
        case 'gz.msgs.WorldStatistics':         return renderWorldStats(bodyEl, obj);
        case 'gz.msgs.CameraInfo':              return renderCameraInfo(bodyEl, obj);
        case 'gz.msgs.Twist':                   return renderTwist(bodyEl, obj);
        default:                                return renderGeneric(bodyEl, obj);
      }
    }

    function renderPose(bodyEl, obj) {
      const p = obj.position || {};
      const q = obj.orientation || {};
      const [roll, pitch, yaw] = quatToEuler(q.x||0, q.y||0, q.z||0, q.w !== undefined ? q.w : 1);
      bodyEl.innerHTML =
        (obj.name ? `<div class="card-entity-name">${escHtml(obj.name)}</div>` : '') +
        section('Position') +
        grid([cell('X', fmtN(p.x), 'm'), cell('Y', fmtN(p.y), 'm'), cell('Z', fmtN(p.z), 'm')]) +
        section('Orientation') +
        grid([cell('Roll', fmtN(roll, 1), '°'), cell('Pitch', fmtN(pitch, 1), '°'), cell('Yaw', fmtN(yaw, 1), '°')]);
    }

    function renderOdometry(bodyEl, obj, topic) {
      const pose  = obj.pose || {};
      const p     = pose.position || {};
      const q     = pose.orientation || {};
      const [roll, pitch, yaw] = quatToEuler(q.x||0, q.y||0, q.z||0, q.w !== undefined ? q.w : 1);
      const twist = obj.twist || {};
      const lv    = twist.linear || {};
      const av    = twist.angular || {};

      const sub = topic ? subscriptions[topic] : null;
      if (sub) {
        if (!sub.altHistory) sub.altHistory = [];
        sub.altHistory.push(p.z || 0);
        if (sub.altHistory.length > 300) sub.altHistory.shift();
      }
      const altData = sub ? sub.altHistory : [];
      const uid = topic ? cssId(topic) : 'odom';

      bodyEl.innerHTML =
        `<div class="odometry-top">` +
          attitudeIndicator(roll, pitch, uid) +
          `<div class="odometry-top-right">` +
            section('Position') +
            grid([cell('X', fmtN(p.x), 'm'), cell('Y', fmtN(p.y), 'm'), cell('Z', fmtN(p.z), 'm')]) +
            section('Orientation') +
            grid([cell('Roll', fmtN(roll, 1), '°'), cell('Pitch', fmtN(pitch, 1), '°'), cell('Yaw', fmtN(yaw, 1), '°')]) +
          `</div>` +
        `</div>` +
        (altData.length > 1 ? altSparkline(altData) : '') +
        section('Linear Velocity') +
        grid([cell('Vx', fmtN(lv.x), 'm/s'), cell('Vy', fmtN(lv.y), 'm/s'), cell('Vz', fmtN(lv.z), 'm/s')]) +
        section('Angular Velocity') +
        grid([cell('ωx', fmtN(av.x, 2), 'rad/s'), cell('ωy', fmtN(av.y, 2), 'rad/s'), cell('ωz', fmtN(av.z, 2), 'rad/s')]);
    }

    function renderClock(bodyEl, obj) {
      const sim = obj.sim || {};
      const real = obj.real || {};
      bodyEl.innerHTML =
        `<div class="clock-row"><span class="clock-label">SIM</span><span class="clock-value">${fmtTime(sim.sec, sim.nsec)}</span></div>` +
        (real.sec !== undefined
          ? `<div class="clock-row"><span class="clock-label">REAL</span><span class="clock-value">${fmtTime(real.sec, real.nsec)}</span></div>`
          : '');
    }

    function renderWorldStats(bodyEl, obj) {
      const sim  = obj.sim_time || obj.simTime || {};
      const rtf  = obj.real_time_factor ?? obj.realTimeFactor;
      const iter = obj.iterations;
      bodyEl.innerHTML = grid([
        cell('RTF',   rtf !== undefined ? fmtN(rtf, 2) : '—', 'x'),
        cell('Sim',   fmtTime(sim.sec, sim.nsec), ''),
        cell('Steps', iter !== undefined ? Number(iter).toLocaleString() : '—', ''),
        cell('State', obj.paused ? 'PAUSED' : 'RUNNING', ''),
      ]);
    }

    function renderCameraInfo(bodyEl, obj) {
      const k = obj.intrinsics && obj.intrinsics.k ? obj.intrinsics.k : [];
      bodyEl.innerHTML =
        section('Resolution') +
        grid([cell('Width', obj.width ?? '—', 'px'), cell('Height', obj.height ?? '—', 'px')]) +
        (k.length >= 6
          ? section('Intrinsics') + grid([
              cell('Fx', fmtN(k[0], 1), 'px'), cell('Fy', fmtN(k[4], 1), 'px'),
              cell('Cx', fmtN(k[2], 1), 'px'), cell('Cy', fmtN(k[5], 1), 'px'),
            ])
          : '');
    }

    function renderTwist(bodyEl, obj) {
      const lv = obj.linear || {};
      const av = obj.angular || {};
      bodyEl.innerHTML =
        section('Linear') +
        grid([cell('X', fmtN(lv.x), 'm/s'), cell('Y', fmtN(lv.y), 'm/s'), cell('Z', fmtN(lv.z), 'm/s')]) +
        section('Angular') +
        grid([cell('X', fmtN(av.x, 2), 'rad/s'), cell('Y', fmtN(av.y, 2), 'rad/s'), cell('Z', fmtN(av.z, 2), 'rad/s')]);
    }

    function renderPoseV(bodyEl, obj, topic) {
      const poses = obj.pose || [];
      if (!poses.length) { bodyEl.innerHTML = '<div class="card-waiting">No poses received</div>'; return; }

      const sub = topic ? subscriptions[topic] : null;
      const pinned = sub && sub.pinnedEntities ? sub.pinnedEntities : new Set();

      const rows = poses.map(p => {
        const pos = p.position || {};
        const name = p.name || String(p.id || '');
        const isPinned = pinned.has(name);
        return `<tr class="${isPinned ? 'row-pinned' : ''}" onclick="pinEntityPose('${escAttr(topic || '')}', '${escAttr(name)}')">
          <td class="pose-table-name">${isPinned ? '[pin] ' : ''}${escHtml(name)}</td>
          <td class="pose-table-val">${fmtN(pos.x, 2)}</td>
          <td class="pose-table-val">${fmtN(pos.y, 2)}</td>
          <td class="pose-table-val">${fmtN(pos.z, 2)}</td>
        </tr>`;
      }).join('');

      bodyEl.innerHTML = `<div class="pose-table-wrap">
        <table class="pose-table">
          <thead><tr><th>Entity (click to pin)</th><th>X (m)</th><th>Y (m)</th><th>Z (m)</th></tr></thead>
          <tbody>${rows}</tbody>
        </table></div>`;

      if (pinned.size > 0) {
        const byName = {};
        for (const p of poses) byName[p.name || String(p.id || '')] = p;
        for (const name of pinned) {
          const pinnedBody = document.getElementById('card-pinned-body-' + cssId(name));
          if (pinnedBody && byName[name]) renderPose(pinnedBody, byName[name]);
        }
      }
    }

    function renderGeneric(bodyEl, obj) {
      function flatten(o, prefix) {
        const out = [];
        for (const [k, v] of Object.entries(o)) {
          const key = prefix ? prefix + '.' + k : k;
          if (v !== null && typeof v === 'object' && !Array.isArray(v)) {
            out.push(...flatten(v, key));
          } else {
            out.push([key, Array.isArray(v)
              ? (v.length <= 6 ? v.map(n => typeof n === 'number' ? fmtN(n, 3) : n).join(', ') : `[${v.length} items]`)
              : String(v)]);
          }
        }
        return out;
      }
      const pairs = flatten(obj, '').slice(0, 40);
      const rows = pairs.map(([k, v]) =>
        `<tr><td class="kv-key">${escHtml(k)}</td><td class="kv-val">${escHtml(v)}</td></tr>`
      ).join('');
      bodyEl.innerHTML = `<div class="kv-wrap"><table class="kv-table"><tbody>${rows}</tbody></table></div>`;
    }

    // -- H.264 Stream Control --

    function publishStreamControl(action, cameraName, url) {
      if (!ws || ws.readyState !== WebSocket.OPEN || !protoRoot) return;

      try {
        const StringMsgV = protoRoot.lookup('gz.msgs.StringMsg_V');
        const dataFields = [action, cameraName];
        if (url) dataFields.push(url);
        const msg = StringMsgV.create({ data: dataFields });
        const payload = StringMsgV.encode(msg).finish();

        const header = 'req,' + STREAM_CONTROL_TOPIC + ',gz.msgs.StringMsg_V,';
        const headerBytes = new TextEncoder().encode(header);
        const frame = new Uint8Array(headerBytes.length + payload.length);
        frame.set(headerBytes);
        frame.set(payload, headerBytes.length);
        ws.send(frame.buffer);
        console.log('Stream control:', action, cameraName, url || '');
      } catch (e) {
        console.error('Failed to send stream control:', e);
      }
    }

    function startStream(topic) {
      if (activeStream) stopStream();

      const cameraName = topic.replace(/^\//, '');
      const streamPath = cameraName.replace(/\//g, '_');
      const whipUrl = MEDIAMTX_BASE + '/' + streamPath + '/whip';

      publishStreamControl('start', cameraName, whipUrl);
      activeStream = topic;

      videoInfoEl.innerHTML = 'Starting <span class="stream-name">' + escHtml(topic) + '</span>...';
      stopBtn.style.display = '';

      connectWebRTCWithRetry(streamPath, 5);
      renderTopicTree();
    }

    function stopStream() {
      if (!activeStream) return;
      const cameraName = activeStream.replace(/^\//, '');
      publishStreamControl('stop', cameraName);

      disconnectWebRTC();
      activeStream = null;

      videoInfoEl.textContent = 'Stream stopped';
      stopBtn.style.display = 'none';
      renderTopicTree();
    }

    // -- WebRTC playback via MediaMTX WHEP --

    async function connectWebRTCWithRetry(streamPath, maxRetries) {
      for (let i = 0; i < maxRetries; i++) {
        await new Promise(r => setTimeout(r, i === 0 ? 4000 : 3000));
        if (!activeStream) return;
        videoInfoEl.innerHTML = 'Connecting <span class="stream-name">/' + escHtml(streamPath) +
          '</span> (attempt ' + (i + 1) + '/' + maxRetries + ')...';
        const ok = await connectWebRTC(streamPath);
        if (ok) return;
      }
      videoInfoEl.textContent = 'Failed to connect after ' + maxRetries + ' attempts';
    }

    async function connectWebRTC(streamPath) {
      disconnectWebRTC();

      const whepUrl = MEDIAMTX_BASE + '/' + streamPath + '/whep';
      const videoEl = document.getElementById('webrtc-player');

      try {
        webrtcPc = new RTCPeerConnection({ iceServers: [] });
        webrtcPc.addTransceiver('video', { direction: 'recvonly' });

        webrtcPc.ontrack = (event) => {
          videoEl.srcObject = event.streams[0];
          videoInfoEl.innerHTML = 'Playing <span class="stream-name">/' +
            escHtml(streamPath) + '</span> - H.264 via WebRTC';
        };

        webrtcPc.oniceconnectionstatechange = () => {
          if (webrtcPc && (webrtcPc.iceConnectionState === 'disconnected' ||
              webrtcPc.iceConnectionState === 'failed')) {
            videoInfoEl.textContent = 'WebRTC disconnected';
          }
        };

        const offer = await webrtcPc.createOffer();
        await webrtcPc.setLocalDescription(offer);

        await new Promise((resolve) => {
          if (webrtcPc.iceGatheringState === 'complete') {
            resolve();
          } else {
            webrtcPc.onicegatheringstatechange = () => {
              if (webrtcPc.iceGatheringState === 'complete') resolve();
            };
          }
        });

        const resp = await fetch(whepUrl, {
          method: 'POST',
          headers: { 'Content-Type': 'application/sdp' },
          body: webrtcPc.localDescription.sdp
        });

        if (!resp.ok) {
          console.log('WHEP not ready yet:', resp.status);
          disconnectWebRTC();
          return false;
        }

        const answer = await resp.text();
        await webrtcPc.setRemoteDescription({ type: 'answer', sdp: answer });
        return true;
      } catch (e) {
        console.error('WebRTC connection failed:', e);
        disconnectWebRTC();
        return false;
      }
    }

    function disconnectWebRTC() {
      if (webrtcPc) { webrtcPc.close(); webrtcPc = null; }
      document.getElementById('webrtc-player').srcObject = null;
    }

    // -- MediaMTX Streams Panel --

    function startStreamsPoll() {
      stopStreamsPoll();
      fetchStreams();
      streamsPollTimer = setInterval(fetchStreams, 3000);
    }

    function stopStreamsPoll() {
      if (streamsPollTimer) { clearInterval(streamsPollTimer); streamsPollTimer = null; }
    }

    async function fetchStreams() {
      const panel = document.getElementById('streams-panel');
      if (!panel) return;
      try {
        const resp = await fetch(MEDIAMTX_API + '/v3/paths/list');
        if (!resp.ok) throw new Error(resp.status);
        const data = await resp.json();
        renderStreamsPanel(panel, data);
      } catch (e) {
        panel.innerHTML = '';
      }
    }

    function fmtBytes(n) {
      if (n == null) return '-';
      if (n < 1024) return n + ' B';
      if (n < 1048576) return (n / 1024).toFixed(1) + ' KB';
      return (n / 1048576).toFixed(1) + ' MB';
    }

    function renderStreamsPanel(panel, data) {
      const items = data.items || [];
      if (items.length === 0) {
        panel.innerHTML = '';
        return;
      }

      let html = '';
      for (const s of items) {
        const statusCls = s.online ? 'online' : s.ready ? 'ready' : 'offline';
        const statusText = s.online ? 'Online' : s.ready ? 'Ready' : 'Offline';

        const track = s.tracks2 && s.tracks2[0];
        const codecLabel = track
          ? track.codec + (track.codecProps ? ' ' + (track.codecProps.width || '') + 'x' + (track.codecProps.height || '') : '')
          : '';

        const readers = s.readers ? s.readers.length : 0;
        const isWatching = activeStream && activeStream.replace(/^\//, '').replace(/\//g, '_') === s.name;

        html += `<div class="stream-row ${isWatching ? 'watching' : ''}">
          <span class="stream-row-name">${escHtml(s.name)}</span>
          <span class="stream-status-badge ${statusCls}">${statusText}</span>
          ${codecLabel ? `<span class="stream-codec">${escHtml(codecLabel)}</span>` : ''}
          <div class="stream-metrics">
            <span class="stream-metric"><span class="stream-metric-label">In</span>${fmtBytes(s.inboundBytes)}</span>
            <span class="stream-metric"><span class="stream-metric-label">Out</span>${fmtBytes(s.outboundBytes)}</span>
            <span class="stream-metric"><span class="stream-metric-label">Viewers</span>${readers}</span>
          </div>
          ${!isWatching && s.online
            ? `<button class="stream-watch-btn" onclick="startStream('/${escAttr(s.name)}')">Watch</button>`
            : ''}
        </div>`;
      }

      panel.innerHTML = html;
    }

    // -- Helpers --

    function cssId(topic) { return topic.replace(/[^a-zA-Z0-9]/g, '_'); }
    function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
    function escAttr(s) { return s.replace(/'/g, "\\'").replace(/"/g, '&quot;'); }

    doConnect();
    setTimeout(() => renderTopicTree(), 0);
</script>
</body>
</html>
